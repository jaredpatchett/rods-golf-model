name: Update Rod's Golf Model data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/30 12-23 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pipeline
        env:
          DG_KEY: ${{ secrets.DG_KEY }}
        run: python3 rods_pipeline.py

      - name: Debug projections endpoint (temporary)
        env:
          DG_KEY: ${{ secrets.DG_KEY }}
        run: python3 debug_projections.py

      - name: Commit updated data if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rods_data.json
          if git diff --cached --quiet; then
            echo "No changes to rods_data.json — skipping commit."
          else
            git commit -m "Auto-update rods_data.json [skip ci]"
            git push
          fi
