name: Update Rod's Golf Model data

# Runs the pipeline in GitHub's cloud (not your Mac), writes rods_data.json,
# and commits it back to the repo. Cloudflare Pages (or GitHub Pages) picks
# up the new commit and redeploys automatically — same pattern as the soccer
# dashboard.

on:
  workflow_dispatch: {}       # adds a manual "Run workflow" button in the Actions tab
  schedule:
    # Every 30 minutes, during (roughly) US daytime/evening on tournament days.
    # Cron is UTC. Adjust the hour range or interval as needed — GitHub's
    # scheduler can lag a few minutes under load, that's normal.
    - cron: "*/30 12-23 * * *"

permissions:
  contents: write   # needed so the workflow can commit rods_data.json back

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pipeline
        env:
          DG_KEY: ${{ secrets.DG_KEY }}
        run: python3 rods_pipeline.py

      - name: Commit updated data if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rods_data.json
          if git diff --cached --quiet; then
            echo "No changes to rods_data.json — skipping commit."
          else
            git commit -m "Auto-update rods_data.json [skip ci]"
            git push
          fi
